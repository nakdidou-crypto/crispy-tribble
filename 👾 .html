<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:radial-gradient(circle at center, #1a1a1a 0%, #000 70%);
}

/* glow */
body::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,0,0,0.08);
    filter:blur(90px);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* score + time */
.score, .time{
    position:fixed;
    top:15px;
    font-size:18px;
    z-index:10;
}
.score{ left:15px; }
.time{ right:15px; }

/* red target box */
.box{
    width:80px;
    height:80px;
    position:absolute;
    border-radius:18px;

    background:radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);

    box-shadow:
        0 0 15px rgba(255,0,0,0.6),
        0 0 40px rgba(255,0,0,0.3);

    border:2px solid rgba(255,255,255,0.15);

    cursor:pointer;

    transition: top 0.2s linear, left 0.2s linear, transform 0.1s;

    animation:pulseBox 1.2s infinite ease-in-out;
}

/* credit */
.credit{
    position:fixed;
    bottom:10px;
    left:10px;
    font-size:12px;
    opacity:0.5;
}

/* animations */
@keyframes pulseBox{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
}
</style>
</head>

<body>

<div class="score">Score: 0</div>
<div class="time">Time: 30</div>

<div class="box"></div>

<div class="credit">dgn sdkt pngthuan sya menghasil ini(dont judge)</div>

<script>
let box = document.querySelector(".box");
let scoreText = document.querySelector(".score");
let timeText = document.querySelector(".time");

let score = 0;
let time = 30;

let clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

/* FIXED safe spawn function */
function moveBox(){

    let size = Math.max(30, 80 - score * 2);

    box.style.width = size + "px";
    box.style.height = size + "px";

    let padding = 10;

    let maxX = window.innerWidth - size - padding;
    let maxY = window.innerHeight - size - padding;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    x = Math.max(padding, x);
    y = Math.max(padding, y);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

/* click */
box.onclick = function(){

    clickSound.currentTime = 0;
    clickSound.play();

    score++;
    scoreText.innerText = "Score: " + score;

    // hit effect
    box.style.transform = "scale(0.8)";
    box.style.background = "lime";

    setTimeout(() => {
        box.style.transform = "scale(1)";
        box.style.background = "radial-gradient(circle at 30% 30%, #ff4d4d, #b30000)";
    }, 120);

    // explosion effect
    let burst = document.createElement("div");
    burst.style.position = "absolute";
    burst.style.width = "20px";
    burst.style.height = "20px";
    burst.style.borderRadius = "50%";
    burst.style.background = "white";
    burst.style.left = box.style.left;
    burst.style.top = box.style.top;
    burst.style.opacity = "0.7";
    burst.style.pointerEvents = "none";
    burst.style.transition = "0.3s";

    document.body.appendChild(burst);

    setTimeout(() => {
        burst.style.transform = "scale(4)";
        burst.style.opacity = "0";
    }, 10);

    setTimeout(() => burst.remove(), 300);

    moveBox();
};

/* timer */
let timer = setInterval(() => {
    time--;
    timeText.innerText = "Time: " + time;

    if(time <= 0){
        clearInterval(timer);
        box.style.display = "none";
        alert("Game Over! Score: " + score);
    }
}, 1000);

moveBox();
</script>

</body>
</html>
